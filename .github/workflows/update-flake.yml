name: Update flake.lock

on:
  # Run every day at 00:00 UTC to keep cryolitia up to date
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Update flake.lock
        id: update
        run: |
          BEFORE=$(git rev-parse HEAD)
          nix flake update --commit-lock-file
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build stable image
        if: steps.update.outputs.updated == 'true'
        continue-on-error: true
        run: nix build .#packages.x86_64-linux.default --out-link result-stable

      - name: Smoke test stable image
        if: steps.update.outputs.updated == 'true'
        continue-on-error: true
        run: |
          docker load < result-stable
          docker run --rm maa-cli-nix:latest maa --version

      - name: Build cryolitia image
        if: steps.update.outputs.updated == 'true'
        continue-on-error: true
        run: nix build .#packages.x86_64-linux.cryolitia --out-link result-cryolitia

      - name: Smoke test cryolitia image
        if: steps.update.outputs.updated == 'true'
        continue-on-error: true
        run: |
          docker load < result-cryolitia
          docker run --rm maa-cli-nix-cryolitia:latest maa --version

      - name: Push to main
        if: steps.update.outputs.updated == 'true'
        run: git push origin main
