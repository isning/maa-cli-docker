name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.variant }} (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: stable
            system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - variant: stable
            system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - variant: cryolitia
            system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - variant: cryolitia
            system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Set image variables
        id: vars
        run: |
          if [ "${{ matrix.variant }}" = "stable" ]; then
            echo "nix_attr=default" >> "$GITHUB_OUTPUT"
            echo "image_name=${{ github.repository_owner }}/maa-cli-nix" >> "$GITHUB_OUTPUT"
            echo "local_tag=maa-cli-nix:latest" >> "$GITHUB_OUTPUT"
          else
            echo "nix_attr=cryolitia" >> "$GITHUB_OUTPUT"
            echo "image_name=${{ github.repository_owner }}/maa-cli-nix-cryolitia" >> "$GITHUB_OUTPUT"
            echo "local_tag=maa-cli-nix-cryolitia:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image with Nix
        run: nix build .#packages.${{ matrix.system }}.${{ steps.vars.outputs.nix_attr }} --out-link result

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Docker image
        run: docker load < result

      - name: Smoke test
        run: docker run --rm "${{ steps.vars.outputs.local_tag }}" maa --version

      - name: Push arch-specific image to GHCR
        run: |
          ARCH_TAG="${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ matrix.arch }}"
          docker tag "${{ steps.vars.outputs.local_tag }}" "${ARCH_TAG}"
          docker push "${ARCH_TAG}"

  build-debian:
    name: Build and Push Debian Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Debian image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.debian
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/maa-cli-debian:latest

  push-manifest:
    name: Push Multi-Arch Manifest (${{ matrix.variant }})
    needs: build
    if: success() || failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - stable
          - cryolitia

    steps:
      - name: Set image name
        id: vars
        run: |
          if [ "${{ matrix.variant }}" = "stable" ]; then
            echo "image_name=${{ github.repository_owner }}/maa-cli-nix" >> "$GITHUB_OUTPUT"
          else
            echo "image_name=${{ github.repository_owner }}/maa-cli-nix-cryolitia" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create \
            "${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:latest" \
            --amend "${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:amd64" \
            --amend "${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:arm64"
          docker manifest push "${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:latest"
