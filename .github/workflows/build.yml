name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  # Run daily at 01:00 UTC (after update-flake at 00:00) to keep MaaCore up-to-date
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.variant }} (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    # On scheduled runs, only rebuild debian variants (to pick up the latest MaaCore via maa install).
    # Nix-based images (stable, cryolitia) are rebuilt on push when flake.lock changes.
    if: github.event_name != 'schedule' || startsWith(matrix.variant, 'debian-')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: stable
            system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - variant: stable
            system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - variant: cryolitia
            system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - variant: cryolitia
            system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - variant: debian-bookworm
            system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - variant: debian-bookworm
            system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64
          - variant: debian-trixie
            system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - variant: debian-trixie
            system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Set image variables
        id: vars
        run: |
          VARIANT="${{ matrix.variant }}"
          ARCH="${{ matrix.arch }}"
          if [ "$VARIANT" = "stable" ]; then
            echo "nix_attr=default" >> "$GITHUB_OUTPUT"
            echo "image_name=${{ github.repository_owner }}/maa-cli-nix" >> "$GITHUB_OUTPUT"
            echo "local_tag=maa-cli-nix:latest" >> "$GITHUB_OUTPUT"
            echo "arch_tag_suffix=${ARCH}" >> "$GITHUB_OUTPUT"
          elif [ "$VARIANT" = "cryolitia" ]; then
            echo "nix_attr=cryolitia" >> "$GITHUB_OUTPUT"
            echo "image_name=${{ github.repository_owner }}/maa-cli-nix-cryolitia" >> "$GITHUB_OUTPUT"
            echo "local_tag=maa-cli-nix-cryolitia:latest" >> "$GITHUB_OUTPUT"
            echo "arch_tag_suffix=${ARCH}" >> "$GITHUB_OUTPUT"
          else
            CODENAME="${VARIANT#debian-}"
            echo "nix_attr=${VARIANT}" >> "$GITHUB_OUTPUT"
            echo "image_name=${{ github.repository_owner }}/maa-cli-debian" >> "$GITHUB_OUTPUT"
            echo "local_tag=maa-cli-debian:latest" >> "$GITHUB_OUTPUT"
            echo "arch_tag_suffix=${CODENAME}-${ARCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image with Nix
        run: nix build .#packages.${{ matrix.system }}.${{ steps.vars.outputs.nix_attr }} --out-link result

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Docker image
        run: docker load < result

      - name: Build final image with MaaCore baked in
        if: startsWith(matrix.variant, 'debian-')
        run: |
          docker build \
            --build-arg BASE=${{ steps.vars.outputs.local_tag }} \
            -f Dockerfile.debian \
            -t ${{ steps.vars.outputs.local_tag }} \
            .

      - name: Smoke test
        run: docker run --rm "${{ steps.vars.outputs.local_tag }}" maa --version

      - name: Push arch-specific image to GHCR
        run: |
          ARCH_TAG="${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.arch_tag_suffix }}"
          docker tag "${{ steps.vars.outputs.local_tag }}" "${ARCH_TAG}"
          docker push "${ARCH_TAG}"

  push-manifest:
    name: Push Multi-Arch Manifest (${{ matrix.variant }})
    needs: build
    if: (success() || failure()) && (github.event_name != 'schedule' || startsWith(matrix.variant, 'debian-'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - stable
          - cryolitia
          - debian-bookworm
          - debian-trixie

    steps:
      - name: Set manifest variables
        id: vars
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}"
          VARIANT="${{ matrix.variant }}"
          if [ "$VARIANT" = "stable" ]; then
            echo "manifest_tag=${BASE}/maa-cli-nix:latest" >> "$GITHUB_OUTPUT"
            echo "amd64_tag=${BASE}/maa-cli-nix:amd64" >> "$GITHUB_OUTPUT"
            echo "arm64_tag=${BASE}/maa-cli-nix:arm64" >> "$GITHUB_OUTPUT"
          elif [ "$VARIANT" = "cryolitia" ]; then
            echo "manifest_tag=${BASE}/maa-cli-nix-cryolitia:latest" >> "$GITHUB_OUTPUT"
            echo "amd64_tag=${BASE}/maa-cli-nix-cryolitia:amd64" >> "$GITHUB_OUTPUT"
            echo "arm64_tag=${BASE}/maa-cli-nix-cryolitia:arm64" >> "$GITHUB_OUTPUT"
          else
            CODENAME="${VARIANT#debian-}"
            echo "manifest_tag=${BASE}/maa-cli-debian:${CODENAME}" >> "$GITHUB_OUTPUT"
            echo "amd64_tag=${BASE}/maa-cli-debian:${CODENAME}-amd64" >> "$GITHUB_OUTPUT"
            echo "arm64_tag=${BASE}/maa-cli-debian:${CODENAME}-arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker manifest create \
            "${{ steps.vars.outputs.manifest_tag }}" \
            --amend "${{ steps.vars.outputs.amd64_tag }}" \
            --amend "${{ steps.vars.outputs.arm64_tag }}"
          docker manifest push "${{ steps.vars.outputs.manifest_tag }}"

      - name: Also tag Debian bookworm as latest
        if: matrix.variant == 'debian-bookworm'
        run: |
          BASE="${{ env.REGISTRY }}/${{ github.repository_owner }}"
          docker manifest create \
            "${BASE}/maa-cli-debian:latest" \
            --amend "${{ steps.vars.outputs.amd64_tag }}" \
            --amend "${{ steps.vars.outputs.arm64_tag }}"
          docker manifest push "${BASE}/maa-cli-debian:latest"
